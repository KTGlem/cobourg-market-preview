  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:#232619;\">Why Local<\u002Fa>\n        <a href=\"events.html\" style=\"text-decoration:none;color:#232619;\">Events<\u002Fa>\n        <a href=\"become-a-vendor.html\" style=\"text-decoration:none;color:#C55C2D;font-weight:700;\">Become a Vendor<\u002Fa>\n        <a href=\"about.html\" style=\"text-decoration:none;color:#232619;\">About<\u002Fa>\n      <\u002Fdiv>\n      <a href=\"#apply\" style=\"text-decoration:none;background:#C55C2D;color:#FBF6EC;font-weight:700;font-size:14px;padding:11px 20px;border-radius:999px;white-space:nowrap;box-shadow:0 6px 16px rgba(197,92,45,.28);\">Apply Now<\u002Fa>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section data-screen-label=\"Vendor Hero\" style=\"background:#234B33;color:#FBF6EC;padding:56px 0;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center;\">\n      <div>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#DDA73A;\">Sell With Us<\u002Fspan>\n        <h1 style=\"font-family:'Young Serif',serif;font-weight:400;font-size:clamp(36px,4.8vw,58px);margin:12px 0 16px;line-height:1.04;\">Grow your business at the market.<\u002Fh1>\n        <p style=\"font-size:18px;line-height:1.6;color:#d7e3da;max-width:520px;margin:0 0 28px;\">Reach thousands of loyal local shoppers every Saturday, join a community of makers who support each other, and build your brand face-to-face. New and seasonal vendors always welcome.<\u002Fp>\n        <a href=\"#apply\" style=\"text-decoration:none;background:#C55C2D;color:#FBF6EC;font-weight:700;font-size:16px;padding:15px 30px;border-radius:999px;display:inline-block;box-shadow:0 8px 22px rgba(197,92,45,.35);\">Start Your Application<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"background:#2C5A3E;border-radius:18px;padding:30px;\">\n        <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:#9dc3a8;margin-bottom:16px;\">VENDOR TESTIMONIAL<\u002Fdiv>\n        <p style=\"font-family:'Young Serif',serif;font-size:23px;line-height:1.35;margin:0 0 20px;\">\"We started with one folding table. Five years later the market is our biggest sales channel — and our customers feel like friends.\"<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;\">\n          <span style=\"width:48px;height:48px;border-radius:50%;background:repeating-linear-gradient(135deg,#37684a,#37684a 7px,#2f5c41 7px,#2f5c41 14px);flex:none;\"><\u002Fspan>\n          <div style=\"font-size:14px;\"><strong>Maya Okafor<\u002Fstrong><br><span style=\"color:#9dc3a8;font-size:13px;\">Sweetgrass Bakehouse · vendor since 2021<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BENEFITS -->\n  <section data-screen-label=\"Benefits\" style=\"max-width:1180px;margin:0 auto;padding:64px 24px;\">\n    <div style=\"text-align:center;max-width:600px;margin:0 auto 36px;\">\n      <span style=\"font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#C55C2D;\">Why Sell Here<\u002Fspan>\n      <h2 style=\"font-family:'Young Serif',serif;font-weight:400;font-size:clamp(28px,3.6vw,44px);color:#234B33;margin:10px 0 0;\">A market that's invested in you<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px;\">\n      <div style=\"background:#FFFFFF;border:1px solid #E5DAC6;border-radius:16px;padding:28px;\">\n        <div style=\"font-family:'Young Serif',serif;font-size:22px;color:#234B33;margin-bottom:8px;\">Built-in audience<\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#4a4f3d;margin:0;\">Thousands of shoppers come every Saturday specifically to buy local. No ad spend required.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF;border:1px solid #E5DAC6;border-radius:16px;padding:28px;\">\n        <div style=\"font-family:'Young Serif',serif;font-size:22px;color:#234B33;margin-bottom:8px;\">Flexible stalls<\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#4a4f3d;margin:0;\">Sign up weekly or for the full season. Start small with a single table and grow at your pace.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF;border:1px solid #E5DAC6;border-radius:16px;padding:28px;\">\n        <div style=\"font-family:'Young Serif',serif;font-size:22px;color:#234B33;margin-bottom:8px;\">Real marketing<\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#4a4f3d;margin:0;\">A vendor profile on our directory, social features, and a community that cross-promotes.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROCESS -->\n  <section style=\"background:#F3EAD8;padding:64px 0;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 24px;\">\n      <span style=\"font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#C55C2D;\">How It Works<\u002Fspan>\n      <h2 style=\"font-family:'Young Serif',serif;font-weight:400;font-size:clamp(28px,3.4vw,42px);color:#234B33;margin:10px 0 30px;\">Apply in three steps<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px;\">\n        <div style=\"background:#FBF6EC;border:1px solid #E5DAC6;border-radius:16px;padding:28px;\">\n          <div style=\"width:44px;height:44px;border-radius:50%;background:#234B33;color:#DDA73A;display:flex;align-items:center;justify-content:center;font-family:'Young Serif',serif;font-size:22px;margin-bottom:16px;\">1<\u002Fdiv>\n          <h3 style=\"font-family:'Young Serif',serif;font-weight:400;font-size:21px;color:#234B33;margin:0 0 8px;\">Tell us about you<\u002Fh3>\n          <p style=\"font-size:14.5px;line-height:1.55;color:#4a4f3d;margin:0;\">Fill out a short application: what you grow or make, where you're based, and a few photos.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF6EC;border:1px solid #E5DAC6;border-radius:16px;padding:28px;\">\n          <div style=\"width:44px;height:44px;border-radius:50%;background:#234B33;color:#DDA73A;display:flex;align-items:center;justify-content:center;font-family:'Young Serif',serif;font-size:22px;margin-bottom:16px;\">2<\u002Fdiv>\n          <h3 style=\"font-family:'Young Serif',serif;font-weight:400;font-size:21px;color:#234B33;margin:0 0 8px;\">We review &amp; chat<\u002Fh3>\n          <p style=\"font-size:14.5px;line-height:1.55;color:#4a4f3d;margin:0;\">Our market team reviews for local, made-or-grown fit — usually within two weeks — and gets in touch.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBF6EC;border:1px solid #E5DAC6;border-radius:16px;padding:28px;\">\n          <div style=\"width:44px;height:44px;border-radius:50%;background:#234B33;color:#DDA73A;display:flex;align-items:center;justify-content:center;font-family:'Young Serif',serif;font-size:22px;margin-bottom:16px;\">3<\u002Fdiv>\n          <h3 style=\"font-family:'Young Serif',serif;font-weight:400;font-size:21px;color:#234B33;margin:0 0 8px;\">Set up your stall<\u002Fh3>\n          <p style=\"font-size:14.5px;line-height:1.55;color:#4a4f3d;margin:0;\">Pick your dates, get your spot, and join the Saturday line-up. We'll help you get going.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- REQUIREMENTS -->\n  <section data-screen-label=\"Requirements\" style=\"max-width:1180px;margin:0 auto;padding:64px 24px;\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:40px;\">\n      <div>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#C55C2D;\">The Basics<\u002Fspan>\n        <h2 style=\"font-family:'Young Serif',serif;font-weight:400;font-size:clamp(26px,3.2vw,38px);color:#234B33;margin:10px 0 18px;\">What we look for<\u002Fh2>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#234B33;color:#DDA73A;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:none;margin-top:1px;\">✓<\u002Fspan><span style=\"font-size:15.5px;line-height:1.45;color:#3f4434;\">Products you grow, raise, bake, or make yourself in Northumberland or the surrounding region<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#234B33;color:#DDA73A;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:none;margin-top:1px;\">✓<\u002Fspan><span style=\"font-size:15.5px;line-height:1.45;color:#3f4434;\">Any food-safety permits or insurance required for your category (we'll point you to what you need)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#234B33;color:#DDA73A;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:none;margin-top:1px;\">✓<\u002Fspan><span style=\"font-size:15.5px;line-height:1.45;color:#3f4434;\">Your own table, tent, and signage — and a friendly face on Saturday mornings<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#234B33;color:#DDA73A;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:none;margin-top:1px;\">✓<\u002Fspan><span style=\"font-size:15.5px;line-height:1.45;color:#3f4434;\">A commitment to the dates you book, so shoppers know they can count on you<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#234B33;color:#FBF6EC;border-radius:18px;padding:30px;\">\n        <div style=\"font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#9dc3a8;font-weight:700;margin-bottom:16px;\">Stall Fees<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:0;\">\n          <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.12);\"><span style=\"font-size:15.5px;\">Casual / weekly stall<\u002Fspan><span style=\"font-family:'Young Serif',serif;font-size:20px;color:#DDA73A;\">$ drop-in<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.12);\"><span style=\"font-size:15.5px;\">Full-season stall<\u002Fspan><span style=\"font-family:'Young Serif',serif;font-size:20px;color:#DDA73A;\">$ seasonal<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;padding:14px 0;\"><span style=\"font-size:15.5px;\">New-vendor first market<\u002Fspan><span style=\"font-family:'Young Serif',serif;font-size:20px;color:#DDA73A;\">Welcome rate<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:12.5px;color:#9dc3a8;margin:16px 0 0;font-family:ui-monospace,monospace;\">Exact fees are placeholders — drop in the market's current rate card here.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section data-screen-label=\"FAQ\" style=\"max-width:820px;margin:0 auto;padding:20px 24px 60px;\">\n    <h2 style=\"font-family:'Young Serif',serif;font-weight:400;font-size:clamp(26px,3.2vw,38px);color:#234B33;margin:0 0 24px;text-align:center;\">Vendor FAQs<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"5\">\n        <div style=\"background:#FFFFFF;border:1px solid #E5DAC6;border-radius:14px;overflow:hidden;\">\n          <button onclick=\"{{ f.onClick }}\" style=\"cursor:pointer;width:100%;text-align:left;font-family:inherit;background:transparent;border:none;padding:20px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n            <span style=\"font-size:16.5px;font-weight:700;color:#234B33;\">{{ f.q }}<\u002Fspan>\n            <span style=\"font-family:'Young Serif',serif;font-size:22px;color:#C55C2D;flex:none;\">{{ f.icon }}<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:0 22px 20px;font-size:15px;line-height:1.6;color:#4a4f3d;\">{{ f.a }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- APPLY CTA -->\n  <section id=\"apply\" data-screen-label=\"Apply CTA\" style=\"max-width:1180px;margin:0 auto;padding:0 24px 70px;\">\n    <div style=\"background:#C55C2D;color:#FBF6EC;border-radius:22px;padding:48px;text-align:center;\">\n      <h2 style=\"font-family:'Young Serif',serif;font-weight:400;font-size:clamp(28px,3.6vw,44px);margin:0 0 12px;\">Ready to join the Saturday line-up?<\u002Fh2>\n      <p style=\"font-size:17px;color:#ffe7d6;max-width:540px;margin:0 auto 26px;\">Tell us about your farm or business and we'll be in touch within two weeks.<\u002Fp>\n      <a href=\"contact.html\" style=\"text-decoration:none;background:#234B33;color:#FBF6EC;font-weight:700;font-size:16px;padding:16px 32px;border-radius:999px;display:inline-block;\">Start Your Application<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer data-screen-label=\"Footer\" style=\"background:#1c3d29;color:#cfe0d3;padding:56px 0 28px;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:0 24px;\">\n      <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:36px;\">\n        <div>\n          <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:14px;\">\n            <img src=\"d2a2fa4f-0b8a-49cf-8cdd-af9bad4eb65e\" alt=\"Cobourg Farmers' Market\" style=\"height:58px;width:auto;display:block;\">\n          <\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.55;max-width:300px;margin:0 0 16px;\">Canada's longest continuously running farmers' market — every Saturday in downtown Cobourg since 1839.<\u002Fp>\n          <div style=\"display:flex;gap:10px;\">\n            <span style=\"width:38px;height:38px;border-radius:10px;background:#2C5A3E;display:flex;align-items:center;justify-content:center;font-size:14px;\">f<\u002Fspan>\n            <span style=\"width:38px;height:38px;border-radius:10px;background:#2C5A3E;display:flex;align-items:center;justify-content:center;font-size:14px;\">◎<\u002Fspan>\n            <span style=\"width:38px;height:38px;border-radius:10px;background:#2C5A3E;display:flex;align-items:center;justify-content:center;font-size:14px;\">✉<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#DDA73A;font-weight:700;margin-bottom:14px;\">Visit<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px;\">\n            <a href=\"this-week.html\" style=\"text-decoration:none;\">This Week<\u002Fa>\n            <a href=\"vendors.html\" style=\"text-decoration:none;\">Meet Our Vendors<\u002Fa>\n            <a href=\"events.html\" style=\"text-decoration:none;\">Events<\u002Fa>\n            <a href=\"about.html\" style=\"text-decoration:none;\">About the Market<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#DDA73A;font-weight:700;margin-bottom:14px;\">Get Involved<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px;\">\n            <a href=\"become-a-vendor.html\" style=\"text-decoration:none;\">Become a Vendor<\u002Fa>\n            <a href=\"why-local-matters.html\" style=\"text-decoration:none;\">Why Local Matters<\u002Fa>\n            <a href=\"sponsors.html\" style=\"text-decoration:none;\">Sponsors &amp; Partners<\u002Fa>\n            <a href=\"contact.html\" style=\"text-decoration:none;\">Contact<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#DDA73A;font-weight:700;margin-bottom:14px;\">Contact<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px;\">\n            <span>Rotary Harbourfront Park<br>Albert St, behind Victoria Hall<br>Downtown Cobourg, ON<\u002Fspan>\n            <span>cobourgfarmersmarket@gmail.com<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid rgba(255,255,255,.1);margin-top:38px;padding-top:20px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:12.5px;color:#9dc3a8;\">\n        <span>© 2026 Cobourg Farmers' Market. Canada's longest continuously running market — since 1839.<\u002Fspan>\n        <span>Accessibility · Privacy · Land Acknowledgement<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:2300}}\">\nclass Component extends DCLogic {\n  state = { open: 0 };\n  renderVals() {\n    const data = [\n      { q: 'Do I have to commit to the whole season?', a: 'No. You can book casual weekly stalls whenever you like, or reserve a spot for the full season if you want a consistent location. Many vendors start casual and switch to seasonal once they find their rhythm.' },\n      { q: 'What can I sell?', a: 'Products you grow, raise, bake, or make yourself — fruit, vegetables, meat, baking, prepared foods, flowers, artisan goods, and specialty foods. We\\u2019re a producer market, so resale of wholesale goods isn\\u2019t a fit.' },\n      { q: 'How much does a stall cost?', a: 'Fees vary by stall type and whether you book casually or for the season, with a welcome rate for your first market. Reach out and we\\u2019ll send you the current rate card.' },\n      { q: 'Do I need insurance or permits?', a: 'It depends on your product category. Some prepared and food items need food-safety permits or liability insurance. Once you apply, we\\u2019ll tell you exactly what your category requires and point you to resources.' },\n      { q: 'I\\u2019m brand new to selling. Is that okay?', a: 'Absolutely — many of our favourite vendors started here with a single folding table. We\\u2019ll help you get set up, and our vendor community is genuinely supportive of newcomers.' },\n    ];\n    const open = this.state.open;\n    const faqs = data.map((d, i) => ({\n      q: d.q, a: d.a, open: i === open, icon: i === open ? '–' : '+',\n      onClick: () => this.setState({ open: open === i ? -1 : i }),\n    }));\n    return { faqs };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
